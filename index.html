            const seriesChecks = card.querySelector('.series-checks');
            if (isFallo) {
                if (stepperBox) stepperBox.style.display = 'none';
                btn.classList.add('expanded');
                if (repsInput) repsInput.disabled = true;
                if (seriesChecks) seriesChecks.style.display = 'none';
                if (falloGrid) { rebuildFalloGrid(card); falloGrid.style.display = 'flex'; }
            } else {
                if (stepperBox) stepperBox.style.display = '';
                btn.classList.remove('expanded');
                if (repsInput) { repsInput.disabled = false; repsInput.style.opacity = ''; }
                if (seriesChecks) seriesChecks.style.display = '';
                if (falloGrid) falloGrid.style.display = 'none';
            }
            scheduleAutoSave();
        }

        function toggleFalloCheck(btn, name, numSets) {
            const card   = btn.closest('.exercise-card');
            const checks = Array.from(card.querySelectorAll('.fallo-check'));
            const idx    = checks.indexOf(btn);
            const current = completedSets[name] || 0;
            const newCount = idx < current ? idx : idx + 1;
            completedSets[name] = newCount;
            checks.forEach((c, i) => c.classList.toggle('checked', i < newCount));
            // sync hidden series-checks
            Array.from(card.querySelectorAll('.series-check')).forEach((c, i) => c.classList.toggle('checked', i < newCount));
            const isDone = newCount >= numSets && numSets > 0;
            card.classList.toggle('completed', isDone);
            const doneCheck = card.querySelector('.ex-done-check');
            if (doneCheck) doneCheck.classList.toggle('done', isDone);
            if (isDone) {
                saveCurrentWorkoutState();
                if (activeTimer && activeTimer.name === name) toggleCardTimer(null, name);
                const allCards = Array.from(document.querySelectorAll('.exercise-card'));
                const ci = allCards.indexOf(card);
                for (let i = ci + 1; i < allCards.length; i++) {
                    if (!allCards[i].classList.contains('completed')) {
                        allCards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
                        break;
                    }
                }
            }
            updateFabVisibility();
        }

        // --- K: COMBINED TOGGLE ---
        function toggleCombined(btn) {
            const card = btn.closest('.exercise-card');
            const isCombined = btn.classList.toggle('active');
            if (isCombined) {
                const falloBtn = card.querySelector('.fallo-toggle');
                if (falloBtn && falloBtn.classList.contains('active')) toggleFallo(falloBtn);
            }
            const statsGrid = card.querySelector('.stats-grid');
            const falloGrid = card.querySelector('.fallo-grid');
            const comboGrid = card.querySelector('.combo-grid');
            const name     = card.dataset.name;
            const safeId   = name.replace(/[^a-zA-Z0-9]/g,'_');

            if (isCombined) {
                const curW  = card.querySelector('.in-weight')?.value || '';
                const prevW = card.querySelector('.in-weight')?.dataset.prev || '';
                // Capture boxes before any DOM mutation
                const boxes = Array.from(statsGrid.querySelectorAll(':scope > .stat-box'));
                const repsBox = boxes[1];
                const pesoBox = boxes[2];
                // Col 2 → Peso 1
                if (repsBox) repsBox.outerHTML = `<div class="stat-box">
                    <label class="stat-label">Peso 1</label>
                    <div class="stepper-box">
                        <button class="stepper-btn" onclick="stepWeight1(this,-2.5)">−</button>
                        <input type="number" inputmode="decimal" min="0" step="any" class="in-w1 weight-input" placeholder="0" value="${curW}" data-prev="${prevW}">
                        <button class="stepper-btn" onclick="stepWeight1(this,2.5)">＋</button>
                    </div>
                    <span class="weight-delta eq" id="delta1-${safeId}" style="${prevW?'':'display:none'}">${prevW?'= '+prevW+'kg':''}</span>
                </div>`;
                // Col 3 → Peso 2
                if (pesoBox) pesoBox.outerHTML = `<div class="stat-box" style="border-right:none">
                    <label class="stat-label">Peso 2</label>
                    <div class="stepper-box">
                        <button class="stepper-btn" onclick="stepWeight2(this,-2.5)">−</button>
                        <input type="number" inputmode="decimal" min="0" step="any" class="in-w2 weight-input" placeholder="0" value="" data-prev="">
                        <button class="stepper-btn" onclick="stepWeight2(this,2.5)">＋</button>
                    </div>
                    <span class="weight-delta eq" id="delta2-${safeId}" style="display:none"></span>
                </div>`;
                // 3 equal columns
                statsGrid.style.gridTemplateColumns = 'minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)';
                if (falloGrid) falloGrid.style.display = 'none';
                const seriesChecksC = card.querySelector('.series-checks');
                if (seriesChecksC) seriesChecksC.style.display = 'none';
                if (comboGrid) { rebuildComboGrid(card); comboGrid.style.display = 'flex'; }
            } else {
                // Capture boxes (now: [0]=Series, [1]=Peso1, [2]=Peso2)
                const boxes = Array.from(statsGrid.querySelectorAll(':scope > .stat-box'));
                const w1Box = boxes[1];
                const w2Box = boxes[2];
                // Col 2 → Reps
                if (w1Box) w1Box.outerHTML = `<div class="stat-box">
                    <label class="stat-label">Reps</label>
                    <div class="reps-stepper-wrap">
                        <div class="stepper-box">
                            <button class="stepper-btn" onclick="stepReps(this,-1)">−</button>
                            <input type="number" inputmode="numeric" min="1" max="99" class="in-reps-num" value="">
                            <button class="stepper-btn" onclick="stepReps(this,1)">＋</button>
                        </div>
                        <button class="fallo-toggle" onclick="toggleFallo(this)">Fallo</button>
                    </div>
                </div>`;
                // Col 3 → Peso
                if (w2Box) w2Box.outerHTML = `<div class="stat-box peso-box">
                    <label class="stat-label">Peso kg</label>
                    <div class="stepper-box">
                        <button class="stepper-btn" onclick="stepWeight(this,-2.5)">−</button>
                        <input type="number" inputmode="decimal" min="0" step="any" class="in-weight weight-input" placeholder="0" value="" data-prev="">
                        <button class="stepper-btn" onclick="stepWeight(this,2.5)">＋</button>
                    </div>
                    <span class="weight-delta eq" id="delta1-${safeId}" style="display:none"></span>
                </div>`;
                // Restore original grid proportions
                statsGrid.style.gridTemplateColumns = '';
                if (comboGrid) comboGrid.style.display = 'none';
                const seriesChecksOff = card.querySelector('.series-checks');
                if (seriesChecksOff) seriesChecksOff.style.display = '';
            }
            scheduleAutoSave();
        }

        function rebuildComboGrid(card) {
            const name     = card.dataset.name;
            const safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            const sets     = parseInt(card.querySelector('.in-sets').value) || 4;
            const grid     = card.querySelector('.combo-grid');
            if (!grid) return;
            const prevRows = Array.from(grid.querySelectorAll('.combo-row'));
            const prevData = prevRows.map(r => [
                r.querySelector('.combo-a')?.value || '',
                r.querySelector('.combo-b')?.value || ''
            ]);
            const checked  = completedSets[name] || 0;
            grid.innerHTML = '';
            for (let i = 0; i < sets; i++) {
                const row = document.createElement('div');
                row.className = 'combo-row';
                row.innerHTML = `<span class="fallo-label">S${i+1}</span>
                    <input type="number" inputmode="numeric" min="0" class="combo-input combo-a" placeholder="—" value="${prevData[i]?.[0]||''}">
                    <span class="combo-sep">+</span>
                    <input type="number" inputmode="numeric" min="0" class="combo-input combo-b" placeholder="—" value="${prevData[i]?.[1]||''}">
                    <button class="fallo-check ${i < checked ? 'checked' : ''}" onclick="toggleFalloCheck(this,'${safeName}',${sets})">✓</button>`;
                grid.appendChild(row);
            }
        }

        // --- I1: EXPAND FIELD ---
        function expandField(btn, field, name, safeId) {
            const section = document.getElementById(field + '-section-' + safeId);
            if (!section) return;
            const isVisible = section.style.display !== 'none';
            if (isVisible) {
                const input = section.querySelector('input, textarea');
                if (!input || !input.value.trim()) {
                    section.style.display = 'none';
                    if (expandedFields[name]) delete expandedFields[name][field];
                }
            } else {
                if (!expandedFields[name]) expandedFields[name] = {};
                expandedFields[name][field] = true;
                section.style.display = '';
                const input = section.querySelector('input, textarea');
                if (input) setTimeout(() => input.focus(), 80);
            }
        }

        function deletePhoto(btn, name) {
            const safeId = name.replace(/[^a-zA-Z0-9]/g,'_');
            const allData = getExData();
            if (allData[name]) { allData[name].img = ''; saveExData(allData); }
            const wrap = document.getElementById('photo-wrap-' + safeId);
            if (wrap) wrap.innerHTML = '';
        }

        // --- WEIGHT DELTA ---
        function updateWeightDeltaEl(input, deltaEl) {
            if (!input || !deltaEl) return;
            const prev = parseFloat(input.dataset.prev);
            const curr = parseFloat(input.value);
            if (isNaN(curr) || input.value === '' || isNaN(prev)) { deltaEl.style.display = 'none'; return; }
            deltaEl.style.display = '';
            const diff = curr - prev;
            const fmt  = v => Number.isInteger(v) ? String(v) : v.toFixed(1);
            if (diff > 0)      { deltaEl.className = 'weight-delta up';   deltaEl.textContent = `↑ +${fmt(diff)}kg`; }
            else if (diff < 0) { deltaEl.className = 'weight-delta down'; deltaEl.textContent = `↓ ${fmt(diff)}kg`; }
            else               { deltaEl.className = 'weight-delta eq';   deltaEl.textContent = `= ${fmt(prev)}kg`; }
        }

        function updateWeightDelta(card) {
            const name   = card.dataset.name;
            const safeId = name.replace(/[^a-zA-Z0-9]/g,'_');
            const inp    = card.querySelector('.in-weight') || card.querySelector('.in-w1');
            const deltaEl = document.getElementById('delta1-' + safeId);
            updateWeightDeltaEl(inp, deltaEl);
        }

        // --- NOTES DOT ---
        function updateNotesDot(card) {
            const notes  = card.querySelector('.in-notes');
            const nameEl = card.querySelector('.ex-name');
            if (!notes || !nameEl) return;
            const hasNotes = notes.value.trim().length > 0;
            const existing = nameEl.querySelector('.notes-dot');
            if (hasNotes && !existing) {
                const dot = document.createElement('span');
                dot.className = 'notes-dot';
                nameEl.appendChild(dot);
            } else if (!hasNotes && existing) {
                existing.remove();
            }
        }

        // --- YOUTUBE AUTO-DETECT ---
        function handleYouTubeDetect(input) {
            const val = input.value.trim();
            const m   = val.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (!m) return;
            const videoId  = m[1];
            const thumbUrl = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            const card = input.closest('.exercise-card');
            if (!card) return;
            const name   = card.dataset.name;
            const safeId = name.replace(/[^a-zA-Z0-9]/g,'_');
            const allData = getExData();
            if (!allData[name]) allData[name] = {};
            allData[name].img = thumbUrl;
            saveExData(allData);
            const wrap = document.getElementById('photo-wrap-' + safeId);
            if (wrap) wrap.innerHTML = `
                <div class="photo-preview-wrap">
                    <div class="photo-preview-thumb" onclick="showModal('${thumbUrl}')"><img src="${thumbUrl}"></div>
                    <button class="photo-del-btn" onclick="deletePhoto(this,'${name.replace(/'/g,"\\'")}')">✕</button>
                </div>`;
            const urlRow = input.closest('.url-row');
            if (urlRow) {
                let btn = urlRow.querySelector('.link-btn');
                if (!btn) { btn = document.createElement('a'); btn.className = 'link-btn'; btn.target = '_blank'; urlRow.appendChild(btn); }
                btn.href = val; btn.textContent = '▶ Ver';
            }
        }

        // --- STEPPERS ---
        function stepSets(btn, delta) {
            const card  = btn.closest('.exercise-card');
            const input = card.querySelector('.in-sets');
            input.value = Math.max(1, (parseInt(input.value) || 1) + delta);
            const falloBtn = card.querySelector('.fallo-toggle');
            const isFallo  = falloBtn && falloBtn.classList.contains('active');
            if (isFallo) rebuildFalloGrid(card);
            const combBtn = card.querySelector('.ctrl-btn[title="Combinado"]');
            if (combBtn && combBtn.classList.contains('active')) rebuildComboGrid(card);
            rebuildSeriesChecks(card);
            scheduleAutoSave();
        }

        function stepReps(btn, delta) {
            const card  = btn.closest('.exercise-card');
            const input = card.querySelector('.in-reps-num');
            if (!input || input.disabled) return;
            input.value = Math.max(1, Math.min(99, (parseInt(input.value) || 1) + delta));
            scheduleAutoSave();
        }

        function stepWeight(btn, delta) {
            const card  = btn.closest('.exercise-card');
            const input = card.querySelector('.in-weight');
            if (!input) return;
            input.value = Math.max(0, Math.round(((parseFloat(input.value) || 0) + delta) * 10) / 10);
            updateWeightDelta(card);
            scheduleAutoSave();
        }

        function stepWeight1(btn, delta) {
            const card  = btn.closest('.exercise-card');
            const input = card.querySelector('.in-w1');
            if (!input) return;
            input.value = Math.max(0, Math.round(((parseFloat(input.value) || 0) + delta) * 10) / 10);
            updateWeightDeltaEl(input, document.getElementById('delta1-' + card.dataset.name.replace(/[^a-zA-Z0-9]/g,'_')));
            scheduleAutoSave();
        }

        function stepWeight2(btn, delta) {
            const card  = btn.closest('.exercise-card');
            const input = card.querySelector('.in-w2');
            if (!input) return;
            input.value = Math.max(0, Math.round(((parseFloat(input.value) || 0) + delta) * 10) / 10);
            updateWeightDeltaEl(input, document.getElementById('delta2-' + card.dataset.name.replace(/[^a-zA-Z0-9]/g,'_')));
            scheduleAutoSave();
        }

        // --- SEARCH ---
        function filterExercises(query) {
            const q = query.toLowerCase().trim();
            document.querySelectorAll('.exercise-card').forEach(card => {
                card.style.display = (!q || (card.dataset.name || '').toLowerCase().includes(q)) ? '' : 'none';
            });
            document.querySelectorAll('.muscle-group-wrapper').forEach(el => {
                el.style.display = q ? 'none' : '';
            });
        }

        function clearSearch() {
            const input = document.querySelector('.search-input');
            if (input) { input.value = ''; filterExercises(''); }
        }

        // --- DRAG & DROP (J1-J3: 250ms hold, >10px cancel, exercise cards only) ---
        (function initDragDrop() {
            let drag = null;
            let holdTimer = null;
            let startX = 0, startY = 0;

            function draggableSiblings() {
                return Array.from(document.getElementById('workout-view').children)
                    .filter(el => el.classList.contains('exercise-card'));
            }

            function allOrderedItems() {
                return Array.from(document.getElementById('workout-view').children)
                    .filter(el => el._exData);
            }

            function startDrag(handle, touch) {
                const card = handle.closest('.exercise-card');
                if (!card) return;
                const rect = card.getBoundingClientRect();
                const ghost = card.cloneNode(true);
                ghost.classList.add('drag-ghost');
                ghost.style.top    = rect.top + 'px';
                ghost.style.height = rect.height + 'px';
                document.body.appendChild(ghost);
                card.classList.add('is-dragging');
                drag = { card, ghost, offsetY: touch.clientY - rect.top };
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend',  onEnd,  { passive: true });
            }

            function onMove(e) {
                if (!drag) return;
                e.preventDefault();
                const touch = e.touches[0];
                const container = document.getElementById('workout-view');
                const cRect = container.getBoundingClientRect();
                const ghostY = Math.min(Math.max(touch.clientY - drag.offsetY, cRect.top), cRect.bottom - drag.ghost.offsetHeight);
                drag.ghost.style.top = ghostY + 'px';

                const sibs = draggableSiblings().filter(s => s !== drag.card);
                draggableSiblings().forEach(s => s.classList.remove('drag-insert-above', 'drag-insert-below'));
                let insertBefore = null;
                for (const sib of sibs) {
                    const r = sib.getBoundingClientRect();
                    if (touch.clientY < r.top + r.height / 2) { insertBefore = sib; break; }
                }
                if (insertBefore) {
                    container.insertBefore(drag.card, insertBefore);
                    insertBefore.classList.add('drag-insert-above');
                } else {
                    container.insertBefore(drag.card, null);
                    if (sibs.length) sibs[sibs.length-1].classList.add('drag-insert-below');
                }
            }

            function onEnd() {
                if (!drag) return;
                drag.ghost.remove();
                drag.card.classList.remove('is-dragging');
                draggableSiblings().forEach(s => s.classList.remove('drag-insert-above', 'drag-insert-below'));
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend',  onEnd);
                const newOrder = allOrderedItems().map(el => el._exData).filter(Boolean);
                if (currentDayIdx !== null && newOrder.length) {
                    routineData[currentDayIdx].ejercicios = newOrder;
                    saveRoutineStructure();
                    tempSaveInputs();
                    openWorkout(currentDayIdx);
                }
                drag = null;
            }

            document.addEventListener('touchstart', e => {
                const handle = e.target.closest('.drag-handle');
                if (!handle) return;
                const card = handle.closest('.exercise-card');
                if (!card) return;
                const touch = e.touches[0];
                startX = touch.clientX; startY = touch.clientY;
                handle.classList.add('hold-ready');
                holdTimer = setTimeout(() => {
                    holdTimer = null;
                    handle.classList.remove('hold-ready');
                    startDrag(handle, touch);
                }, 250);
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                if (!holdTimer) return;
                const touch = e.touches[0];
                if (Math.abs(touch.clientX - startX) > 10 || Math.abs(touch.clientY - startY) > 10) {
                    clearTimeout(holdTimer); holdTimer = null;
                    const handle = e.target.closest('.drag-handle');
                    if (handle) handle.classList.remove('hold-ready');
                }
            }, { passive: true });

            document.addEventListener('touchend', e => {
                if (holdTimer) {
                    clearTimeout(holdTimer); holdTimer = null;
                    const handle = e.target.closest('.drag-handle');
                    if (handle) handle.classList.remove('hold-ready');
                }
            }, { passive: true });
        })();

        // --- SWIPE BACK GESTURE ---
        (function() {
            const EDGE_ZONE   = 35;   // px desde el borde (izq o der) para activar
            const MIN_SWIPE_X = 60;   // desplazamiento horizontal mínimo
            const MAX_SWIPE_Y = 80;   // desplazamiento vertical máximo (evita scroll)
            const MAX_TIME    = 400;  // ms máximos para el gesto

            let startX = 0, startY = 0, startTime = 0, fromEdge = false;

            document.addEventListener('touchstart', e => {
                const t = e.touches[0];
                startX    = t.clientX;
                startY    = t.clientY;
                startTime = Date.now();
                fromEdge  = startX <= EDGE_ZONE || startX >= (window.innerWidth - EDGE_ZONE);
            }, { passive: true });

            document.addEventListener('touchend', e => {
                if (!fromEdge) return;

                const t      = e.changedTouches[0];
                const dx     = t.clientX - startX;
                const dy     = t.clientY - startY;
                const dt     = Date.now() - startTime;
                const isBack = document.getElementById('back-btn') &&
                               !document.getElementById('back-btn').classList.contains('hidden');

                if (!isBack) return; // ya estamos en dashboard, no hacer nada

                const swipedFromLeft  = startX <= EDGE_ZONE  && dx >  MIN_SWIPE_X;
                const swipedFromRight = startX >= (window.innerWidth - EDGE_ZONE) && dx < -MIN_SWIPE_X;

                if ((swipedFromLeft || swipedFromRight) && Math.abs(dy) < MAX_SWIPE_Y && dt < MAX_TIME) {
                    e.preventDefault();
                    goHome();
                }
            }, { passive: true });
        })();

        // --- MANIFEST ---
        function updateManifest() {
            const config   = getConfig();
            const iconSrc  = config.appIcon || new URL("icon.png", location.href).href;
            const iconType = config.appIcon ? "image/jpeg" : "image/png";
            const accent   = config.accentColor || '#0d0a07';
            const manifest = {
                "name": "Gym", "short_name": "Gym", "start_url": ".",
                "display": "standalone", "background_color": "#0d0a07",
                "theme_color": accent, "orientation": "portrait",
                "icons": [
                    { "src": iconSrc, "sizes": "192x192", "type": iconType, "purpose": "any maskable" },
                    { "src": iconSrc, "sizes": "512x512", "type": iconType, "purpose": "any maskable" }
                ]
            };
            const existing = document.querySelector('link[rel="manifest"]');
            if (existing) existing.remove();
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:'application/json'}));
            document.head.appendChild(link);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // Defer heavy init off the first paint so the background renders first
        setTimeout(() => {
            loadRoutine();
            const config = getConfig();
            if (config.logo) applyBgImage(config.logo);
            if (config.appIcon) applyHeaderLogo(config.appIcon);
            if (config.accentColor) applyAccentColor(config.accentColor, false);
            updateManifest();
            requestAnimationFrame(() => {
                renderDashboard();
                const app = document.getElementById('app-content');
                if (app) {
                    app.classList.add('opening');
                    app.addEventListener('animationend', () => {
                        app.style.opacity = '1';
                        app.classList.remove('opening');
                    }, { once: true });
                }
            });
        }, 0);
    </script>
